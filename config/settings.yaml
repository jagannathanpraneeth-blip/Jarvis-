# ============================================================
# JARVIS — Settings
# Non-secret configuration lives here. Secrets go in .env
# ============================================================

# --- General ---
assistant_name: "JARVIS"
user_name: "Sir"          # How JARVIS addresses you — change to your name

# --- LLM Brain ---
brain:
  model: "nvidia/nemotron-3-ultra-550b-a55b"
  temperature: 1.0
  max_output_tokens: 16384
  personality_file: "config/personality.md"

# --- Memory ---
memory:
  buffer_size: 20                       # Number of conversation turns to keep in short-term memory

# --- Logging ---
logging:
  level: "INFO"                         # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_to_file: true
  log_dir: "logs"

# --- Voice ---
voice:
  wake_word: "hey_jarvis"
  wake_word_threshold: 0.5
  stt_model: "base.en"           # tiny.en, base.en, small.en, medium.en
  tts_engine: "piper"            # piper, system
  tts_voice: "en_US-lessac-medium"
  push_to_talk_key: "space"
  silence_threshold: 0.02        # Audio energy level to detect silence
  silence_duration: 1.5          # Seconds of silence to stop recording
  continuous_conversation: false  # Keep listening after response

# --- Plugins ---
plugins:
  enabled: true
  god_mode: true
  plugin_dir: "plugins"
#   disabled:
#     - smart_home

