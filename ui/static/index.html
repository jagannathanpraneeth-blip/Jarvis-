<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Core Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-cyan-dim: rgba(0, 229, 255, 0.2);
            --neon-cyan-glow: rgba(0, 229, 255, 0.6);
            --bg-color: #030710;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at center, rgba(0, 229, 255, 0.05) 0%, transparent 60%);
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Background Grid */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            perspective: 1000px;
            transform-origin: center;
            animation: grid-pulse 10s infinite alternate;
        }

        @keyframes grid-pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        /* ─── ARC REACTOR CORE ─── */
        .arc-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan-dim);
        }

        /* Outer Rotating Ring */
        .ring-outer {
            width: 450px;
            height: 450px;
            border-top: 4px solid var(--neon-cyan);
            border-bottom: 4px solid var(--neon-cyan);
            animation: spin 8s linear infinite;
            box-shadow: 0 0 20px var(--neon-cyan-dim);
        }

        /* Middle Dashed Ring */
        .ring-middle {
            width: 380px;
            height: 380px;
            border: 2px dashed var(--neon-cyan);
            animation: spin-reverse 12s linear infinite;
            opacity: 0.7;
        }

        /* Inner Energy Core */
        .energy-core {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #fff 0%, var(--neon-cyan) 40%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--neon-cyan-glow), inset 0 0 30px #fff;
            animation: pulse-idle 4s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        /* Core State Label */
        .core-state {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
            z-index: 20;
            text-transform: uppercase;
        }

        /* Core Animations based on State */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        
        @keyframes pulse-idle {
            0% { transform: scale(1); box-shadow: 0 0 50px var(--neon-cyan-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(0, 229, 255, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 50px var(--neon-cyan-glow); }
        }

        /* ─── HOLOGRAPHIC TELEMETRY PANELS ─── */
        .panel {
            position: absolute;
            background: rgba(0, 20, 30, 0.4);
            border: 1px solid var(--neon-cyan-dim);
            backdrop-filter: blur(10px);
            padding: 20px;
            width: 300px;
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .panel-left { left: 50px; top: 50%; transform: translateY(-50%); }
        .panel-right { right: 50px; top: 50%; transform: translateY(-50%); }
        .panel-top { top: 30px; left: 50%; transform: translateX(-50%); width: 400px; text-align: center; }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--neon-cyan-dim);
            padding-bottom: 5px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stat-label { color: rgba(255,255,255,0.5); }
        .stat-value { text-shadow: 0 0 8px var(--neon-cyan-dim); }
        .value-warn { color: #ff3366; text-shadow: 0 0 8px rgba(255, 51, 102, 0.5); }

        /* Camera Feed Hidden Panel */
        #camera-panel {
            display: none; /* Only show when activated */
            bottom: 40px;
            right: 50px;
            top: auto;
            transform: none;
            width: 350px;
            height: 250px;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- Top Branding -->
    <div class="panel panel-top">
        <h1 style="margin:0; font-family: 'Orbitron'; font-size: 2rem; letter-spacing: 8px;">J.A.R.V.I.S.</h1>
        <div style="font-size: 0.9rem; letter-spacing: 3px; color: rgba(255,255,255,0.5);">AUTONOMOUS AI MATRIX</div>
    </div>

    <!-- Left Telemetry -->
    <div class="panel panel-left">
        <div class="panel-title">SYSTEM PROTOCOLS</div>
        
        <div class="stat-row">
            <span class="stat-label">NEURAL ENGINE</span>
            <span class="stat-value" id="stat-model">NEMOTRON</span>
        </div>
        
        <div class="stat-row">
            <span class="stat-label">GOD MODE</span>
            <span class="stat-value" id="stat-godmode">INACTIVE</span>
        </div>
        
        <div class="stat-row">
            <span class="stat-label">VOICE SYNTHESIS</span>
            <span class="stat-value" id="stat-voice">ONLINE</span>
        </div>
        
        <div class="stat-row" style="margin-top: 20px;">
            <span class="stat-label">UPLINK</span>
            <span class="stat-value" id="conn-status">STABLE</span>
        </div>
    </div>

    <!-- Central Arc Reactor -->
    <div class="arc-container">
        <div class="ring ring-outer"></div>
        <div class="ring ring-middle"></div>
        <div class="energy-core" id="core">
            <div class="core-state" id="core-state">IDLE</div>
        </div>
    </div>

    <!-- Right Telemetry -->
    <div class="panel panel-right">
        <div class="panel-title">ENVIRONMENT</div>
        
        <div class="stat-row">
            <span class="stat-label">SUB-ROUTINES</span>
            <span class="stat-value">OPERATIONAL</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">PERSISTENCE</span>
            <span class="stat-value">ACTIVE</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">OPTICAL SENSOR</span>
            <span class="stat-value">STANDBY</span>
        </div>
    </div>

    <!-- Future Video Panel -->
    <div class="panel" id="camera-panel">
        <div class="panel-title">LIVE OPTICAL FEED</div>
        <div style="width: 100%; height: calc(100% - 40px); background: #000; border: 1px solid var(--neon-cyan-dim); display: flex; align-items: center; justify-content: center;">
            [FEED OFFLINE]
        </div>
    </div>

    <script>
        const core = document.getElementById('core');
        const coreStateText = document.getElementById('core-state');
        
        async function fetchState() {
            try {
                // Fetch internal status config
                const statusRes = await fetch('/api/status');
                const statusData = await statusRes.json();
                
                // Update UI panels
                document.getElementById('stat-model').textContent = statusData.model.split('/')[1] || statusData.model;
                
                const gmEl = document.getElementById('stat-godmode');
                gmEl.textContent = statusData.god_mode ? "ACTIVE" : "RESTRICTED";
                gmEl.className = statusData.god_mode ? "stat-value value-warn" : "stat-value";
                
                const voiceEl = document.getElementById('stat-voice');
                voiceEl.textContent = statusData.muted ? "MUTED" : "ONLINE";
                voiceEl.className = statusData.muted ? "stat-value value-warn" : "stat-value";
                
                document.getElementById('conn-status').textContent = "STABLE";
                document.getElementById('conn-status').style.color = "var(--neon-cyan)";
                
                // Determine JARVIS visual state (idle, listening, thinking, speaking)
                // We'll read this from a new IPC state file via API or logs. 
                // For now, if logs are actively streaming, we simulate thinking.
                // In Phase 9, we can expose `/api/state` from the cross-process temp file.
                
                const stateRes = await fetch('/api/state').catch(() => null);
                if (stateRes) {
                    const stateData = await stateRes.json();
                    updateCore(stateData.status.toUpperCase());
                } else {
                    updateCore("IDLE");
                }

            } catch (err) {
                document.getElementById('conn-status').textContent = "DISCONNECTED";
                document.getElementById('conn-status').className = "stat-value value-warn";
                updateCore("OFFLINE");
            }
        }
        
        function updateCore(state) {
            coreStateText.textContent = state;
            
            if (state === "THINKING") {
                core.style.background = "radial-gradient(circle, #fff 0%, #ffaa00 40%, transparent 70%)";
                core.style.boxShadow = "0 0 80px rgba(255, 170, 0, 0.8), inset 0 0 30px #fff";
                core.style.animationDuration = "0.5s";
            } else if (state === "SPEAKING") {
                core.style.background = "radial-gradient(circle, #fff 0%, #0066ff 40%, transparent 70%)";
                core.style.boxShadow = "0 0 100px rgba(0, 102, 255, 0.9), inset 0 0 30px #fff";
                core.style.animationDuration = "0.2s";
            } else if (state === "LISTENING") {
                core.style.background = "radial-gradient(circle, #fff 0%, #00ff66 40%, transparent 70%)";
                core.style.boxShadow = "0 0 60px rgba(0, 255, 102, 0.7), inset 0 0 30px #fff";
                core.style.animationDuration = "2s";
            } else {
                // Idle / Offline
                core.style.background = "radial-gradient(circle, #fff 0%, var(--neon-cyan) 40%, transparent 70%)";
                core.style.boxShadow = "0 0 50px var(--neon-cyan-glow), inset 0 0 30px #fff";
                core.style.animationDuration = "4s";
            }
        }

        // Poll every 500ms
        setInterval(fetchState, 500);
        fetchState();
    </script>
</body>
</html>
