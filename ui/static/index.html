<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0e17;
            --accent-blue: #00e5ff;
            --accent-blue-dim: rgba(0, 229, 255, 0.2);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 150, 255, 0.05), transparent 25%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .orb {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--accent-blue));
            box-shadow: 0 0 20px var(--accent-blue-dim);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px var(--accent-blue-dim); }
            50% { box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); }
            100% { box-shadow: 0 0 15px var(--accent-blue-dim); }
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--accent-blue-dim);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        main {
            padding: 40px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
            width: calc(100% - 80px);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Logs Console */
        .console {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #a9b7c6;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 600px;
            line-height: 1.5;
            border: 1px solid #1e293b;
        }
        
        .log-info { color: #5bc0de; }
        .log-warn { color: #f0ad4e; }
        .log-error { color: #d9534f; }
        .log-user { color: #5cb85c; }
        
        /* Stats Panel */
        .stat-group {
            margin-bottom: 25px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 300;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="orb"></div>
            <h1>JARVIS</h1>
        </div>
        <div class="status-badge" id="conn-status">ONLINE</div>
    </header>

    <main>
        <!-- Live Terminal Stream -->
        <div class="card">
            <div class="card-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                Live Diagnostics
            </div>
            <div class="console" id="log-container">
                <!-- Logs injected here -->
                <div style="color: #64748b;">Waiting for system logs...</div>
            </div>
        </div>

        <!-- Sidebar Stats -->
        <div class="card">
            <div class="card-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                System Telemetry
            </div>
            
            <div class="stat-group">
                <div class="stat-label">Model Engine</div>
                <div class="stat-value" id="stat-model">Loading...</div>
            </div>
            
            <div class="stat-group">
                <div class="stat-label">God Mode</div>
                <div class="stat-value" id="stat-godmode" style="color: var(--accent-blue);">Disabled</div>
            </div>
            
            <div class="stat-group">
                <div class="stat-label">Voice Output</div>
                <div class="stat-value" id="stat-voice">Loading...</div>
            </div>
            
            <div class="stat-group">
                <div class="stat-label">Active Sub-Agents</div>
                <div class="stat-value" id="stat-agents">0</div>
            </div>
        </div>
    </main>

    <script>
        const logContainer = document.getElementById('log-container');
        
        function formatLog(line) {
            // Apply simple colors based on keywords
            let formatted = line
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
                
            if (formatted.includes("ERROR") || formatted.includes("[FAIL]")) {
                return `<span class="log-error">${formatted}</span>`;
            } else if (formatted.includes("WARNING") || formatted.includes("[WARN]")) {
                return `<span class="log-warn">${formatted}</span>`;
            } else if (formatted.includes("User:") || formatted.includes("Sir >")) {
                return `<span class="log-user">${formatted}</span>`;
            } else if (formatted.includes("INFO") || formatted.includes("[PASS]")) {
                return `<span class="log-info">${formatted}</span>`;
            }
            return formatted;
        }

        async function fetchState() {
            try {
                // Fetch Status
                const statusRes = await fetch('/api/status');
                const statusData = await statusRes.json();
                
                document.getElementById('stat-model').textContent = statusData.model;
                
                const gmEl = document.getElementById('stat-godmode');
                gmEl.textContent = statusData.god_mode ? "ACTIVE" : "Restricted";
                gmEl.style.color = statusData.god_mode ? "#d9534f" : "var(--accent-blue)";
                
                const voiceEl = document.getElementById('stat-voice');
                voiceEl.textContent = statusData.muted ? "Muted" : "Active";
                voiceEl.style.color = statusData.muted ? "#f0ad4e" : "var(--text-primary)";
                
                // Fetch Logs
                const logRes = await fetch('/api/logs?lines=50');
                const logData = await logRes.json();
                
                if (logData.logs) {
                    const isScrolledToBottom = logContainer.scrollHeight - logContainer.clientHeight <= logContainer.scrollTop + 1;
                    
                    logContainer.innerHTML = logData.logs.map(l => `<div>${formatLog(l)}</div>`).join('');
                    
                    // Auto-scroll if they were already at the bottom
                    if (isScrolledToBottom) {
                        logContainer.scrollTop = logContainer.scrollHeight;
                    }
                }
                
                document.getElementById('conn-status').textContent = "ONLINE";
                document.getElementById('conn-status').style.borderColor = "var(--accent-blue)";
                document.getElementById('conn-status').style.color = "var(--accent-blue)";
                
            } catch (err) {
                console.error("Connection error:", err);
                document.getElementById('conn-status').textContent = "OFFLINE";
                document.getElementById('conn-status').style.borderColor = "#d9534f";
                document.getElementById('conn-status').style.color = "#d9534f";
            }
        }

        // Poll every 1 second
        setInterval(fetchState, 1000);
        fetchState();
    </script>
</body>
</html>
